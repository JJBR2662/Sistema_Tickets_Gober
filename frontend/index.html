<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Tickets</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="navbar">
    <div class="navbar-brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <path d="M9 12h6M9 16h4"/>
      </svg>
      <span>Sistema de Tickets</span>
    </div>
    <div class="navbar-badge">Redmine API</div>
  </header>

  <main class="main-content">

    <div class="page-title">
      <h1>Reportar un Problema</h1>
      <p>Completa el formulario para enviar un ticket al equipo de soporte.</p>
    </div>

    <div class="card">

      <div class="card-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>Nuevo Ticket</span>
      </div>

      <form id="ticketForm" class="ticket-form" novalidate>

        <div class="form-group">
          <label for="subject">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            Asunto <span class="required">*</span>
          </label>
          <input
            type="text"
            id="subject"
            name="subject"
            placeholder="Describe brevemente el problema..."
            maxlength="120"
            required
          />
          <span class="char-count" id="subjectCount">0 / 120</span>
          <span class="field-error" id="subjectError">El asunto es obligatorio.</span>
        </div>

        <div class="form-group">
          <label for="description">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="17" y1="10" x2="3" y2="10"/>
              <line x1="21" y1="6" x2="3" y2="6"/>
              <line x1="21" y1="14" x2="3" y2="14"/>
              <line x1="17" y1="18" x2="3" y2="18"/>
            </svg>
            Descripción
          </label>
          <textarea
            id="description"
            name="description"
            rows="4"
            placeholder="Detalla el problema, pasos para reproducirlo, comportamiento esperado..."
          ></textarea>
        </div>

        <div class="form-group">
          <label for="screenshot">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            Captura de Pantalla
          </label>
          <div class="upload-area" id="uploadArea">
            <input type="file" id="screenshot" name="screenshot" accept="image/*" hidden />
            <div class="upload-placeholder" id="uploadPlaceholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <polyline points="16 16 12 12 8 16"/>
                <line x1="12" y1="12" x2="12" y2="21"/>
                <path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/>
              </svg>
              <p>Arrastra una imagen aquí o <span class="upload-link">haz clic para seleccionar</span></p>
              <small>PNG, JPG, GIF — máx. 5 MB</small>
            </div>
            <div class="image-preview hidden" id="imagePreview">
              <img id="previewImg" src="" alt="Vista previa" />
              <button type="button" class="remove-image" id="removeImage" title="Quitar imagen">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="18" y1="6" x2="6" y2="18"/>
                  <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>
              <span id="fileName" class="file-name"></span>
            </div>
          </div>
        </div>

        <div class="form-group priority-row">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            Prioridad
          </label>
          <div class="priority-options">
            <label class="priority-btn">
              <input type="radio" name="priority" value="1" />
              <span class="prio-low">Baja</span>
            </label>
            <label class="priority-btn">
              <input type="radio" name="priority" value="2" checked />
              <span class="prio-normal">Normal</span>
            </label>
            <label class="priority-btn">
              <input type="radio" name="priority" value="3" />
              <span class="prio-high">Alta</span>
            </label>
            <label class="priority-btn">
              <input type="radio" name="priority" value="4" />
              <span class="prio-urgent">Urgente</span>
            </label>
          </div>
        </div>

        <div class="form-actions">
          <button type="reset" class="btn-secondary" id="resetBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="1 4 1 10 7 10"/>
              <path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
            </svg>
            Limpiar
          </button>
          <button type="submit" class="btn-primary" id="submitBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
            <span id="submitLabel">Enviar Ticket</span>
          </button>
        </div>

      </form>
    </div>

  </main>

  <div class="toast hidden" id="toast">
    <div class="toast-icon" id="toastIcon"></div>
    <div class="toast-content">
      <strong id="toastTitle"></strong>
      <p id="toastMessage"></p>
    </div>
    <button class="toast-close" id="toastClose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
